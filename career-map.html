      const gid = "grad-inset-" + i;
      const grad = defs.append("linearGradient").attr("id", gid)
        .attr("x1", a[0]).attr("y1", a[1]).attr("x2", b[0]).attr("y2", b[1]).attr("gradientUnits", "userSpaceOnUse");
      grad.append("stop").attr("offset", "0%").attr("stop-color", colors[i]);
      grad.append("stop").attr("offset", "100%").attr("stop-color", colors[i+1]);
      clippedG.append("path").attr("d", lineI([a,[mx,my],b]))
        .attr("fill","none").attr("stroke","url(#" + gid + ")").attr("stroke-width",2).attr("stroke-dasharray","7 2");
    }
    const gI = clippedG.selectAll("g.node").data(indiaNodes).enter().append("g")
      .attr("transform", d => { const p = projI([d.lon, d.lat]); return "translate(" + p[0] + "," + p[1] + ")"; });
    gI.append("circle").attr("r", 4).attr("fill", (d,i) => colors[i]).attr("stroke", "#fff").attr("stroke-width", 1.2);
    const insetLabelOffsets = [
      {dx: 8, dy: -6},
      {dx: 8, dy: 14},
      {dx: -8, dy: 16, anchor: "end"}
    ];
    gI.append("text").attr("class", "sub")
      .attr("x", (d,i) => insetLabelOffsets[i].dx)
      .attr("y", (d,i) => insetLabelOffsets[i].dy)
      .attr("text-anchor", (d,i) => insetLabelOffsets[i].anchor || "start")
      .attr("fill", (d,i) => colors[i])
      .attr("font-weight", "600")
      .text(d => d.place.replace(", India",""));
  });
</script>
</body>
</html>
